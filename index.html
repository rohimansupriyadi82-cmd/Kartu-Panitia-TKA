<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator ID Card TKA 2026 - Premium & Profesional</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --card-width: 7cm;
            --card-height: 11cm;
        }

        /* MEMASTIKAN WARNA TETAP SAMA SAAT DICETAK */
        * { 
            box-sizing: border-box; 
            -webkit-print-color-adjust: exact !important; 
            print-color-adjust: exact !important;
            color-adjust: exact !important;
        }
        
        body {
            font-family: 'Poppins', Arial, sans-serif;
            background-color: #e9ecef;
            margin: 0;
            padding: 20px;
        }

        /* --- LAYOUT UTAMA --- */
        .app-layout {
            display: flex;
            gap: 25px;
            align-items: flex-start;
            max-width: 1500px;
            margin: 0 auto;
        }

        /* --- DASHBOARD CONTROL (SIDEBAR KIRI) --- */
        #admin-panel {
            width: 380px;
            flex-shrink: 0;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            position: sticky;
            top: 20px;
            max-height: 95vh;
            overflow-y: auto;
        }

        .creator-credit {
            font-size: 11px;
            color: #888;
            text-align: right;
            margin-top: -10px;
            margin-bottom: 15px;
            font-style: italic;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .input-group { display: flex; flex-direction: column; margin-bottom: 5px; }
        label { font-weight: 600; font-size: 13px; margin-bottom: 4px; color: #444; }
        input, select { 
            padding: 10px 12px; 
            border: 1.5px solid #ddd; 
            border-radius: 8px; 
            font-size: 13px; 
            font-family: 'Poppins', sans-serif;
            transition: border-color 0.3s;
        }
        input:focus, select:focus { border-color: #007bff; outline: none; }

        .button-group { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .btn { 
            padding: 12px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            font-family: 'Poppins', sans-serif;
            color: white; 
            transition: transform 0.2s, box-shadow 0.2s;
            text-align: center;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .btn-add { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .btn-print { background: linear-gradient(135deg, #0052d4, #4364f7); }
        .btn-reset { background: linear-gradient(135deg, #cb2d3e, #ef473a); }

        /* --- PREVIEW AREA (KANAN) --- */
        .main-content {
            flex-grow: 1;
            min-height: 100vh;
        }

        #print-area {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: flex-start;
        }

        /* --- KONTROL PER KARTU --- */
        .card-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #ddd;
        }

        .card-controls {
            display: flex;
            gap: 10px;
            background: #fff;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .card-controls select {
            flex-grow: 1;
            padding: 8px;
            font-size: 12px;
            border-radius: 5px;
            cursor: pointer;
        }

        .card-controls button {
            background: #ff4d4d;
            border: none;
            color: white;
            border-radius: 5px;
            padding: 0 15px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
        }
        .card-controls button:hover { background: #cc0000; }

        .card-faces {
            display: flex;
            gap: 15px;
        }

        /* --- THE CARD DESIGN --- */
        .id-card {
            width: var(--card-width);
            height: var(--card-height);
            position: relative;
            overflow: hidden;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
        }

        /* --- POLA GUILLOCHE (MICRO-PATTERN) --- */
        .id-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                repeating-linear-gradient(45deg, rgba(0,0,0,0.02) 0px, rgba(0,0,0,0.02) 1px, transparent 1px, transparent 4px),
                repeating-linear-gradient(-45deg, rgba(0,0,0,0.02) 0px, rgba(0,0,0,0.02) 1px, transparent 1px, transparent 4px);
            z-index: 1;
            pointer-events: none;
        }

        /* --- WATERMARK --- */
        .watermark {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 75%;
            opacity: 0.06;
            z-index: 2;
            pointer-events: none;
            filter: grayscale(100%);
        }

        /* --- 10 TEMA WARNA --- */
        .theme-blue { --primary: #1e3c72; --secondary: #2a5298; --accent: #ffcc00; --text-light: #fff; --text-dark: #1e3c72; }
        .theme-red { --primary: #cb2d3e; --secondary: #ef473a; --accent: #ffd700; --text-light: #fff; --text-dark: #cb2d3e; }
        .theme-green { --primary: #0f2027; --secondary: #203a43; --accent: #38ef7d; --text-light: #fff; --text-dark: #11998e; }
        .theme-purple { --primary: #4e54c8; --secondary: #8f94fb; --accent: #ffb88c; --text-light: #fff; --text-dark: #4e54c8; }
        .theme-orange { --primary: #e65c00; --secondary: #F9D423; --accent: #1e3c72; --text-light: #fff; --text-dark: #e65c00; }
        .theme-dark { --primary: #141E30; --secondary: #243B55; --accent: #00d2ff; --text-light: #fff; --text-dark: #141E30; }
        .theme-gold { --primary: #a87b1e; --secondary: #f6d365; --accent: #111; --text-light: #fff; --text-dark: #8c6514; }
        .theme-cyber { --primary: #fc00ff; --secondary: #00dbde; --accent: #fff; --text-light: #fff; --text-dark: #9100c4; }
        .theme-tropical { --primary: #ff9a44; --secondary: #fc6076; --accent: #ffe83f; --text-light: #fff; --text-dark: #d63c52; }
        .theme-mystic { --primary: #134e5e; --secondary: #71b280; --accent: #ffeb3b; --text-light: #fff; --text-dark: #134e5e; }

        /* Background Shapes */
        .bg-top {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary)) !important;
            clip-path: polygon(0 0, 100% 0, 100% 75%, 0 100%);
            z-index: 1;
        }

        .bg-accent-line {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 53%;
            background-color: var(--accent) !important;
            clip-path: polygon(0 0, 100% 0, 100% 75%, 0 100%);
            z-index: 0;
        }

        .bg-bottom {
            position: absolute;
            bottom: 0; right: 0; width: 60%; height: 25%;
            background: linear-gradient(to top left, var(--secondary), transparent) !important;
            opacity: 0.15;
            clip-path: circle(70% at 100% 100%);
            z-index: 1;
        }

        /* Header & Punch Hole */
        .card-header {
            position: relative;
            z-index: 10;
            text-align: center;
            padding-top: 15px;
            color: var(--text-light) !important;
        }
        
        .punch-hole {
            position: absolute;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border: 1px dashed rgba(255,255,255,0.8);
            border-radius: 10px;
            z-index: 20;
        }

        .card-header h1 { font-size: 26px; margin: 0; font-weight: 800; letter-spacing: 1px; text-shadow: 1px 1px 3px rgba(0,0,0,0.3); }
        .card-header p { font-size: 9.5px; margin: 2px 0; font-weight: 600; letter-spacing: 0.5px; opacity: 0.9; }

        /* Content */
        .content-wrapper {
            position: relative;
            z-index: 15;
            margin-top: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .photo-box {
            width: 3.2cm;
            height: 4.2cm;
            background: #fff !important;
            border: 3px solid #fff;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            overflow: hidden;
            position: relative;
            z-index: 15;
        }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; }

        .jabatan-badge {
            background: var(--text-dark) !important;
            color: #fff !important;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 800;
            text-align: center;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transform: translateY(-12px);
            z-index: 20;
            border: 2px solid #fff;
            letter-spacing: 0.5px;
            max-width: 90%;
        }

        /* Identity */
        .identity-box {
            position: relative;
            z-index: 20;
            text-align: center;
            width: 90%;
            margin: -8px auto 0;
        }

        .info-name {
            font-size: 14px;
            font-weight: 800;
            color: var(--text-dark) !important;
            margin-bottom: 2px;
            text-transform: uppercase;
            line-height: 1.2;
        }

        .info-nip {
            font-size: 10.5px;
            font-weight: 600;
            color: #555 !important;
            background: rgba(0,0,0,0.05);
            padding: 2px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 4px;
        }

        .info-id-unik {
            font-size: 10px;
            font-weight: 700;
            color: var(--primary) !important;
            letter-spacing: 0.5px;
        }

        /* Footer */
        .card-footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            z-index: 20;
            padding: 6px 15px;
            background: #fff !important;
            border-top: 1px solid #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .valid-thru {
            font-size: 8px;
            font-weight: 700;
            color: #d9534f !important;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .footer-accent-line {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary)) !important;
        }

        .footer-logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        .custom-logo { height: 26px; width: 26px; object-fit: contain; }
        .footer-brand { font-size: 8.5px; line-height: 1.2; font-weight: 700; text-align: left; color: #333 !important;}
        .footer-brand span { font-weight: 500; font-size: 7px; color: #777 !important; }

        /* --- SISI BELAKANG (BACK CARD) --- */
        .id-card.back-side {
            background: #fff;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .back-side::before { opacity: 0.5; } /* Guilloche lebih tipis di belakang */

        .back-header {
            text-align: center;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 8px;
            margin-bottom: 12px;
            position: relative;
            z-index: 10;
        }
        .back-header h3 { margin: 0; font-size: 14px; font-weight: 800; color: var(--text-dark) !important; }
        .back-header p { margin: 2px 0 0; font-size: 10px; font-weight: 600; color: #666 !important; }

        .back-content {
            font-size: 9.5px;
            line-height: 1.5;
            color: #333 !important;
            flex-grow: 1;
            position: relative;
            z-index: 10;
        }
        .back-content ol { padding-left: 15px; margin: 0; }
        .back-content li { margin-bottom: 4px; text-align: justify; }

        .qr-placeholder {
            text-align: center;
            margin-top: 10px;
        }
        .qr-placeholder img { width: 75px; height: 75px; border: 1px solid #eee; padding: 2px; }

        .back-footer {
            background: var(--primary) !important;
            color: #fff !important;
            font-size: 8px;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            margin-top: auto;
            position: relative;
            z-index: 10;
            line-height: 1.3;
        }

        /* --- PRINT LOGIC --- */
        @media print {
            @page {
                size: A4;
                margin: 0.5cm;
            }

            body { padding: 0; background: none; }
            
            #admin-panel, .card-controls { display: none !important; }
            .app-layout { display: block; }

            .card-group {
                background: none;
                padding: 0;
                border: none;
                margin-bottom: 15px;
            }

            #print-area {
                display: flex;
                flex-wrap: wrap;
                gap: 15px;
                justify-content: center;
                margin: 0 auto;
            }

            .card-faces {
                gap: 15px;
            }

            .id-card {
                border: 0.1mm solid #ccc;
                page-break-inside: avoid;
                box-shadow: none;
                border-radius: 5px;
            }
        }

        @media (max-width: 900px) {
            .app-layout { flex-direction: column; }
            #admin-panel { width: 100%; position: static; max-height: none; }
            .card-faces { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="app-layout">
        <div id="admin-panel">
            <div class="creator-credit">Created by Rohiman Supriyadi</div>
            <h2 style="margin-top:0; color: #1e3c72; font-weight: 800;">ID Card Generator</h2>
            
            <div class="form-grid">
                <div class="input-group">
                    <label>Judul Event</label>
                    <input type="text" id="in-judul" value="TKA 2026">
                </div>
                <div class="input-group">
                    <label>Tahun Pelajaran</label>
                    <input type="text" id="in-tahun" value="2025/2026" placeholder="Contoh: 2025/2026">
                </div>
                <div class="input-group">
                    <label>Jabatan</label>
                    <select id="in-jabatan">
                        <option value="PENANGGUNG JAWAB">PENANGGUNG JAWAB</option>
                        <option value="KETUA PANITIA">KETUA PANITIA</option>
                        <option value="SEKRETARIS">SEKRETARIS</option>
                        <option value="BENDAHARA">BENDAHARA</option>
                        <option value="PROKTOR">PROKTOR</option>
                        <option value="TEKNISI">TEKNISI</option>
                        <option value="PENGAWAS RUANG">PENGAWAS RUANG</option>
                        <option value="ANGGOTA">ANGGOTA</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="in-nama" placeholder="ROHIMAN KHAN">
                </div>
                <div class="input-group">
                    <label>NIP</label>
                    <input type="text" id="in-nip" placeholder="19XXXXXXXXXXXXXX">
                </div>
                <div class="input-group">
                    <label>Foto Panitia</label>
                    <input type="file" id="in-foto" accept="image/*">
                </div>
                <div class="input-group">
                    <label>Logo Tutwuri/Watermark</label>
                    <input type="file" id="in-logo" accept="image/*">
                </div>
            </div>

            <div class="button-group">
                <button class="btn btn-add" onclick="tambahKartu()">+ Tambahkan ke Daftar</button>
                <button class="btn btn-print" onclick="window.print()">🖨️ Cetak ID Card</button>
                <button class="btn btn-reset" onclick="resetDaftar()">🗑️ Bersihkan Daftar</button>
            </div>

            <div style="text-align:center; font-size: 11px; font-weight: 600; color: #666; margin-top: 20px;">
                ⚠️ Aktifkan "Background Graphics" saat Print (Ctrl+P).<br>
                Tahun di ID & Masa Berlaku otomatis mengambil tahun genap/belakang.
            </div>
        </div>

        <div class="main-content">
            <div id="print-area"></div>
        </div>
    </div>

    <script>
        let listData = [];
        let fotoData = "";
        let logoData = "https://upload.wikimedia.org/wikipedia/commons/9/9c/Logo_Tut_Wuri_Handayani.png";
        let cardCounter = 0;

        document.getElementById('in-foto').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function() { fotoData = reader.result; };
            if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        });

        document.getElementById('in-logo').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function() { logoData = reader.result; renderKartu(); };
            if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        });

        function tambahKartu() {
            const nama = document.getElementById('in-nama').value;
            const tahunInput = document.getElementById('in-tahun').value;
            if(!nama) return alert("Mohon isi nama terlebih dahulu.");

            cardCounter++;

            // LOGIKA: Mengambil tahun belakang (Contoh: 2025/2026 -> 2026)
            let tahunFinal = tahunInput;
            if(tahunInput.includes('/')) {
                const splitTahun = tahunInput.split('/');
                tahunFinal = splitTahun[1].trim(); // Ambil bagian belakang
            } else {
                tahunFinal = tahunInput.trim();
            }
            
            // Format ID Panitia menggunakan tahun belakang
            const idUnik = `PAN-TKA-${tahunFinal}-${String(cardCounter).padStart(3, '0')}`;

            const data = {
                id: cardCounter,
                idUnik: idUnik,
                judul: document.getElementById('in-judul').value,
                tahunFull: tahunInput, // Untuk Header (2025/2026)
                tahunMasa: tahunFinal, // Untuk ID & Masa Berlaku (2026)
                jabatan: document.getElementById('in-jabatan').value,
                tema: 'theme-blue',
                nama: nama,
                nip: document.getElementById('in-nip').value || '-',
                foto: fotoData || "https://via.placeholder.com/300x400/eeeeee/888888?text=FOTO",
            };

            listData.push(data);
            renderKartu();
            
            document.getElementById('in-nama').value = ""; 
            document.getElementById('in-nip').value = ""; 
        }

        function renderKartu() {
            const container = document.getElementById('print-area');
            container.innerHTML = "";

            const themes = [
                {val: 'theme-blue', name: 'Biru Samudra'},
                {val: 'theme-red', name: 'Merah Delima'},
                {val: 'theme-green', name: 'Hijau Zamrud'},
                {val: 'theme-purple', name: 'Ungu Elegan'},
                {val: 'theme-orange', name: 'Oranye Senja'},
                {val: 'theme-dark', name: 'Gelap Modern'},
                {val: 'theme-gold', name: 'Emas Premium'},
                {val: 'theme-cyber', name: 'Neon Cyberpunk'},
                {val: 'theme-tropical', name: 'Tropis'},
                {val: 'theme-mystic', name: 'Hijau Mistis'}
            ];

            listData.forEach(item => {
                let optionsHTML = themes.map(t => 
                    `<option value="${t.val}" ${item.tema === t.val ? 'selected' : ''}>${t.name}</option>`
                ).join('');

                // QR CODE: Berisi Identitas Panitia
                const qrContent = encodeURIComponent(`ID: ${item.idUnik}\nNama: ${item.nama}\nJabatan: ${item.jabatan}\nNIP: ${item.nip}`);
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${qrContent}`;

                container.innerHTML += `
                    <div class="card-group" id="wrapper-${item.id}">
                        <div class="card-controls">
                            <select onchange="gantiTemaKartu(${item.id}, this.value)">
                                ${optionsHTML}
                            </select>
                            <button onclick="hapusKartu(${item.id})" title="Hapus Kartu">Hapus</button>
                        </div>

                        <div class="card-faces">
                            <!-- SISI DEPAN -->
                            <div class="id-card ${item.tema}" id="front-${item.id}">
                                <div class="bg-accent-line"></div>
                                <div class="bg-top"></div>
                                <div class="bg-bottom"></div>
                                
                                <div class="punch-hole"></div>
                                <img src="${logoData}" class="watermark">
                                
                                <div class="card-header">
                                    <h1>${item.judul}</h1>
                                    <p>TES KEMAMPUAN AKADEMIK<br>TAHUN PELAJARAN ${item.tahunFull}</p>
                                </div>
                                
                                <div class="content-wrapper">
                                    <div class="photo-box"><img src="${item.foto}"></div>
                                    <div class="jabatan-badge">${item.jabatan}</div>
                                </div>

                                <div class="identity-box">
                                    <div class="info-name">${item.nama}</div>
                                    <div class="info-nip">NIP. ${item.nip}</div>
                                    <div class="info-id-unik">ID: ${item.idUnik}</div>
                                </div>
                                
                                <div class="card-footer">
                                    <div class="footer-accent-line"></div>
                                    <div class="valid-thru">Masa Berlaku: Selama TKA ${item.tahunMasa}</div>
                                    <div class="footer-logo-area">
                                        <img src="${logoData}" class="custom-logo">
                                        <div class="footer-brand">
                                            KEMENTERIAN PENDIDIKAN<br>
                                            <span>Panitia Pelaksana TKA Pusat</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- SISI BELAKANG -->
                            <div class="id-card back-side ${item.tema}" id="back-${item.id}">
                                <img src="${logoData}" class="watermark">
                                
                                <div class="back-header">
                                    <h3>SOP & KETENTUAN</h3>
                                    <p>TATA TERTIB PANITIA</p>
                                </div>

                                <div class="back-content">
                                    <ol>
                                        <li>Memakai ID Card ini selama berada di area pelaksanaan ujian TKA.</li>
                                        <li>ID Card ini merupakan tanda pengenal resmi dan tidak dapat dipindahtangankan.</li>
                                        <li>Menjaga kerahasiaan dokumen, kelancaran, dan ketertiban ruang ujian.</li>
                                        <li>Menjalankan tugas pokok sesuai instruksi Penanggung Jawab TKA.</li>
                                    </ol>
                                    
                                    <div class="qr-placeholder">
                                        <img src="${qrUrl}" alt="QR Validasi">
                                        <div style="font-size:7px; margin-top:2px; font-weight:bold;">SCAN VALIDASI</div>
                                    </div>
                                </div>

                                <div class="back-footer">
                                    <strong>PENTING:</strong><br>
                                    Barang siapa menemukan kartu ini harap mengembalikan ke Sekretariat TKA terdekat.
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function gantiTemaKartu(id, temaBaru) {
            const frontCard = document.getElementById('front-' + id);
            const backCard = document.getElementById('back-' + id);
            frontCard.className = 'id-card ' + temaBaru;
            backCard.className = 'id-card back-side ' + temaBaru;
            const index = listData.findIndex(item => item.id === id);
            if(index !== -1) listData[index].tema = temaBaru;
        }

        function hapusKartu(id) {
            listData = listData.filter(item => item.id !== id);
            renderKartu();
        }

        function resetDaftar() {
            if(confirm("Apakah Anda yakin ingin menghapus semua kartu?")) {
                listData = [];
                cardCounter = 0;
                renderKartu();
            }
        }
    </script>
</body>
</html>
